name: publish-linux

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: 8.0.x
  PROJECT_FILE: RaxportNetCore.csproj

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_FILE }} /p:PublishProfile=linux-single

      - name: Verify single-file publish
        run: |
          test -f bin/Raxport
          test "$(find bin -maxdepth 1 -type f | wc -l)" -eq 1
          ls -lh bin/Raxport

      - name: Smoke test
        run: bin/Raxport -h

      - name: Prepare artifact
        run: |
          mkdir -p release
          cp bin/Raxport release/Raxport-linux-x64
          chmod +x release/Raxport-linux-x64

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Raxport-linux-x64
          path: release/Raxport-linux-x64
          if-no-files-found: error

      - name: Upload release asset
        if: ${{ github.event_name == 'release' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" release/Raxport-linux-x64 --clobber
