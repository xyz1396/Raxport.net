name: publish-linux

on:
  push:
    branches:
      - main
  pull_request:
    branches: [ master ]
  release:
    types: [ created ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x' # The .NET SDK version to use

jobs:
  publish:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install dependencies
      run: dotnet restore src/RaxportNetCore.csproj

    - name: Prepare build
      run: |
        mkdir -p release
      
    - name: Build
      run: |
        dotnet publish src/RaxportNetCore.csproj /p:PublishProfile=linux-x64-single-file
        cp bin/Raxport-linux-x64 release/Raxport-linux-x64
        # cp README.md release/README.md
    
    - name: Upload build artificats
      uses: actions/upload-artifact@v4
      with:
        name: Raxport-linux
        path: release/*

    - name: Upload binaries to the release
      uses: svenstaro/upload-release-action@v2
      # if: ${{ github.event_name == 'release' }}
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        tag: ${{ github.ref }}
        file: release/*
        overwrite: true
        file_glob: true
