name: publish-linux

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  release:
    types: [ created ]
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install native build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config autoconf automake libtool ninja-build

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          rm -rf vcpkg
          git clone --depth 1 https://github.com/microsoft/vcpkg.git vcpkg
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Install native libraries
        shell: bash
        run: |
          ./vcpkg/vcpkg install hdf5:x64-linux
          ./vcpkg/vcpkg install sqlite3:x64-linux-dynamic

      - name: Publish
        shell: bash
        run: |
          rm -rf bin release
          dotnet publish src/RaxportNetCore.csproj /p:PublishProfile=linux-x64-single-file -p:UseSharedCompilation=false
          mkdir -p release
          cp bin/Raxport-linux-x64 release/Raxport-linux-x64
          chmod +x release/Raxport-linux-x64
          test ! -e bin/libraxport_hdf5.so

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Raxport-linux-x64
          path: release/Raxport-linux-x64
          if-no-files-found: error

      - name: Upload binaries to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
