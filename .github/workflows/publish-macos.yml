name: publish-macos

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: osx-x64-single-file
            artifact: Raxport-osx-x64
            triplet: x64-osx
            runner: macos-15-intel
          - profile: osx-arm64-single-file
            artifact: Raxport-osx-arm64
            triplet: arm64-osx
            runner: macos-15

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install native build prerequisites
        run: brew install autoconf automake libtool pkg-config ninja || true

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          rm -rf vcpkg
          git clone --depth 1 https://github.com/microsoft/vcpkg.git vcpkg
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Install HDF5
        shell: bash
        run: ./vcpkg/vcpkg install hdf5:${{ matrix.triplet }}

      - name: Publish
        shell: bash
        run: |
          rm -rf bin release
          dotnet publish src/RaxportNetCore.csproj /p:PublishProfile=${{ matrix.profile }} -p:UseSharedCompilation=false
          mkdir -p release
          cp bin/${{ matrix.artifact }} release/${{ matrix.artifact }}
          chmod +x release/${{ matrix.artifact }}
          test ! -e bin/libraxport_hdf5.dylib

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}
          if-no-files-found: error

      - name: Upload binaries to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
